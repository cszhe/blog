name: Build and Deploy to Firebase

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle install

      - name: Build Jekyll
        run: |
          bundle exec jekyll build

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Firebase credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/gcp-key.json"
          if echo "$GCP_SA_KEY" | jq -e . >/dev/null 2>&1; then
            printf '%s' "$GCP_SA_KEY" > "$KEY_FILE"
          else
            echo "$GCP_SA_KEY" | base64 --decode > "$KEY_FILE"
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: |
          npm install --global firebase-tools

      - name: Deploy to Firebase
        run: |
          firebase deploy --only hosting --public _site --project zhe-dev --non-interactive
